
services:

  api:
    build:
      context: ./
      dockerfile: Dockerfile
    container_name: api
    restart: unless-stopped
    env_file:
      - ./api/.env
    ports:
      - "8080:8080"
    depends_on:
      clickhouse:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--spider",
          "-q",
          "http://localhost:8080/health"
        ]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - analytics

  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    container_name: clickhouse
    restart: unless-stopped
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_DB: analytics
      CLICKHOUSE_USER: test
      CLICKHOUSE_PASSWORD: test
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./api/docker/clickhouse/init:/docker-entrypoint-initdb.d
    healthcheck:
      test:
        [
          "CMD",
          "clickhouse-client",
          "--query",
          "SELECT 1"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - analytics

  prometheus:
    image: prom/prometheus:v3.5.0
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./api/docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      api:
        condition: service_started
    networks:
      - analytics

  grafana:
    image: grafana/grafana:12.1.1
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      # Install automatically on first startup
      GF_INSTALL_PLUGINS: grafana-clickhouse-datasource
    volumes:
      - grafana_data:/var/lib/grafana
      - ./api/docker/grafana/provisioning:/etc/grafana/provisioning
      - ./api/docker/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      clickhouse:
        condition: service_healthy
      prometheus:
       condition: service_started
    networks:
      - analytics

  ecommerce:
    build: 
      context: ./
      dockerfile: ui.Dockerfile
    container_name: ecommerce
    restart: unless-stopped
    env_file:
      - ./ecommerce/.env
    ports:
      - "5173:5173"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - analytics
      
networks:
  analytics:
    driver: bridge

volumes:
  clickhouse_data:

  grafana_data:
    